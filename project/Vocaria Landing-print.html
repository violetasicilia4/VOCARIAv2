<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Vocaria — Descubrí qué estudiar en 7 minutos</title>
  <meta name="description" content="Orientación vocacional basada en psicología real. Te ayudamos a ver tu patrón y encontrar carreras y universidades argentinas que encajan con quien sos." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Print-only styles: paged, static, all content visible */
    @page {
      size: A4 portrait;
      margin: 14mm 10mm;
    }
    @media print {
      html, body {
        background: #FBF9F4 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        padding-bottom: 0 !important;
        overflow: visible !important;
      }
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
        will-change: auto !important;
      }
      /* Reveal every fade-in element */
      .fade-in {
        opacity: 1 !important;
        transform: none !important;
      }
      /* Hide UI chrome that doesn't make sense on paper */
      .nav-shell,
      .reading-progress,
      .sticky-bar,
      .bg-halo {
        display: none !important;
      }
      /* Hero card sits in a parallax wrapper — neutralize transform */
      .result-card-wrap {
        transform: none !important;
        opacity: 1 !important;
      }
      /* Dudas pills: kill float animation + restore vertical offsets baseline */
      .duda-pill {
        animation: none !important;
        transform: rotate(var(--rot, 0deg)) !important;
      }
      /* Test starter: progress bar filled, options visible, reveal collapsed
         (we don't print the reveal since nothing's selected) */
      .starter-card__progress-fill { width: 14% !important; }
      .starter-opt {
        opacity: 1 !important;
        transform: none !important;
      }
      /* Open every FAQ item for print */
      .faq-item .faq-answer {
        max-height: none !important;
        opacity: 1 !important;
        padding-top: 12px !important;
      }
      .faq-item .faq-chevron {
        transform: rotate(180deg) !important;
      }
      /* Page-break hygiene */
      section,
      .footer {
        break-inside: avoid-page;
        page-break-inside: avoid;
      }
      .hero { break-after: page; page-break-after: always; }
      #laberinto, #vistaprevia, #faq, .cta-final {
        break-before: auto;
        page-break-before: auto;
      }
      /* CTA final dark bg: force color rendering */
      .cta-final, .footer {
        background: #100F0E !important;
        color: white !important;
      }
      /* Tighter section padding for paper */
      .section { padding: 24px 16px !important; }
      .cta-final { padding: 40px 20px !important; }
      .footer { padding: 28px 20px !important; }
      /* Avoid magnetic button creating phantom padding in print */
      .cta-btn { box-shadow: none !important; }
      /* Hero card: keep visible without parallax */
      .hero__grid { gap: 28px !important; }
      /* Dudas mural: tighter for paper */
      .dudas-mural { gap: 8px 10px !important; padding: 6px 0 12px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react" src="ui.jsx"></script>
  <script type="text/babel" data-presets="react" src="result-card.jsx"></script>
  <script type="text/babel" data-presets="react" src="test-teaser.jsx"></script>
  <script type="text/babel" data-presets="react" src="layout.jsx"></script>
  <script type="text/babel" data-presets="react" src="sections-1.jsx"></script>
  <script type="text/babel" data-presets="react" src="sections-2.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script type="text/babel" data-presets="react">
    // Auto-print once fonts + React tree are ready
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) {}
      // Wait for the React root to mount its children
      const rootEl = document.getElementById('root');
      const waitForMount = () => new Promise((resolve) => {
        const check = () => {
          if (rootEl && rootEl.children.length > 0) return resolve();
          requestAnimationFrame(check);
        };
        check();
      });
      await waitForMount();
      // Extra settle delay for any FadeIn IntersectionObserver passes
      await new Promise((r) => setTimeout(r, 600));
      window.print();
    })();
  </script>
</body>
</html>
